  <script>
    /* ═══════════════════════════════════════
       GOLDEN FIREFLIES — interactive
       Generates N fireflies, marks a few as "beacons", listens for clicks,
       and brings a subset closer when you scroll into a new section.
       ═══════════════════════════════════════ */
    (function () {
      const layer = document.getElementById('fireflies');
      if (!layer) return;

      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      /* Detect mobile/touch devices and low-end devices so we can cap firefly
         counts. The check uses a combination of:
           - viewport width (most reliable for "phone" detection)
           - hardware concurrency (low-end CPUs report ≤4 logical cores)
         On either signal we drop the count significantly. */
      const isMobile = window.matchMedia('(max-width: 768px), (pointer: coarse) and (hover: none)').matches;
      const isLowEnd = (navigator.hardwareConcurrency || 4) <= 4;
      const lite = isMobile || isLowEnd;

      const FIREFLY_COUNT = reduce ? 18 : (lite ? 50 : 120);
      const BEACON_COUNT = reduce ? 2 : (lite ? 4 : 7);
      const APPROACH_COUNT = lite ? 5 : 8;

      const rand = (min, max) => Math.random() * (max - min) + min;
      const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];

      // Keep references to all created fireflies so we can pick "approach" subsets later.
      const fireflies = [];

      for (let i = 0; i < FIREFLY_COUNT; i++) {
        const f = document.createElement('div');
        f.className = 'firefly';

        // Depth 0 (far) → 1 (close). Bias toward FAR using Math.random()² so
        // most fireflies are tiny background stars; only ~10% feel "close".
        // This is what makes the field look galactic instead of sparse.
        const rawDepth = Math.random();
        const depth = rawDepth * rawDepth;        // squared = far-biased
        const size = 1.5 + depth * 6;             // 1.5px (far) → 7.5px (close)
        const peakOpacity = 0.25 + depth * 0.75;
        const glowSize = size * (3 + depth * 5);

        const driftDur = rand(20, 38) - depth * 6;
        const blinkDur = rand(2.4, 6.5);          // wider blink range = more variation
        const startX = rand(0, 100);
        const startY = rand(0, 100);

        const dx1 = rand(-100, 100), dy1 = rand(-70, 70);
        const dx2 = rand(-100, 100), dy2 = rand(-70, 70);
        const dx3 = rand(-100, 100), dy3 = rand(-70, 70);

        const driftDelay = -rand(0, driftDur);
        const blinkDelay = -rand(0, blinkDur);

        // Color tier: ~85% gold, ~10% pale-amber, ~5% champagne (cooler tone)
        // This subtle variation keeps the field from feeling monochrome.
        const colorRoll = Math.random();
        let tone = 'gold';
        if (colorRoll > 0.95) tone = 'champagne';
        else if (colorRoll > 0.85) tone = 'amber';
        f.dataset.tone = tone;

        f.style.cssText = `
          left:  ${startX}vw;
          top:   ${startY}vh;
          width:  ${size}px;
          height: ${size}px;
          --peak-opacity: ${peakOpacity};
          --glow-size:    ${glowSize}px;
          --drift-dur:    ${driftDur}s;
          --blink-dur:    ${blinkDur}s;
          --drift-delay:  ${driftDelay}s;
          --blink-delay:  ${blinkDelay}s;
          --dx1: ${dx1}px; --dy1: ${dy1}px;
          --dx2: ${dx2}px; --dy2: ${dy2}px;
          --dx3: ${dx3}px; --dy3: ${dy3}px;
        `;

        // Tag every firefly with a stable id so click logs are traceable.
        f.dataset.id = 'firefly-' + i;
        f.dataset.baseSize = size;

        if (reduce) {
          f.style.animation = 'none';
          f.style.opacity = peakOpacity * 0.6;
        }

        layer.appendChild(f);
        fireflies.push(f);
      }

      /* ─────────────────────────────────────────────────────────────
         BEACONS — pick N fireflies to pulse strongly.
         These are the "important" fireflies that catch the eye.
         ───────────────────────────────────────────────────────────── */
      // Pick beacons from the upper half of the depth range so they're naturally bigger.
      const beaconCandidates = fireflies
        .map((f, i) => ({ f, i, depth: parseFloat(f.style.getPropertyValue('--peak-opacity')) }))
        .filter(x => x.depth > 0.7);
      // Shuffle and take the first BEACON_COUNT
      beaconCandidates.sort(() => Math.random() - 0.5);
      beaconCandidates.slice(0, BEACON_COUNT).forEach(({ f }) => {
        f.classList.add('firefly--beacon');
      });

      /* ─────────────────────────────────────────────────────────────
         INTERACTIVITY — click any firefly to log + visual burst.
         Uses event delegation on the container so we don't attach
         45 listeners.
         ───────────────────────────────────────────────────────────── */
      layer.addEventListener('click', (e) => {
        const f = e.target.closest('.firefly');
        if (!f) return;

        // 1. Log the click (visible in DevTools console)
        const isBeacon = f.classList.contains('firefly--beacon');
        const section = currentSection || 'unknown';
        console.log('🪲 Firefly clicked', {
          id: f.dataset.id,
          beacon: isBeacon,
          section,
          time: new Date().toISOString()
        });

        // 2. Visual burst — temporary class, removed after animation ends
        f.classList.add('firefly--burst');
        // Spawn a ripple where the firefly was
        const rect = f.getBoundingClientRect();
        const ripple = document.createElement('div');
        ripple.className = 'firefly-ripple';
        ripple.style.left = (rect.left + rect.width / 2) + 'px';
        ripple.style.top = (rect.top + rect.height / 2) + 'px';
        document.body.appendChild(ripple);

        setTimeout(() => f.classList.remove('firefly--burst'), 700);
        setTimeout(() => ripple.remove(), 1100);
      });

      /* ─────────────────────────────────────────────────────────────
         SECTION-AWARE "APPROACH" — when a section becomes the most
         visible, a random subset of fireflies grows + brightens.
         ───────────────────────────────────────────────────────────── */
      let currentSection = null;

      if (!reduce && 'IntersectionObserver' in window) {
        const sections = document.querySelectorAll('section[id]');

        // Pre-shuffle helper so each section picks a different subset.
        function pickApproachSet() {
          const shuffled = fireflies.slice().sort(() => Math.random() - 0.5);
          return shuffled.slice(0, APPROACH_COUNT);
        }

        // Track which fireflies are currently "close" so we can recede them.
        let approaching = [];

        const observer = new IntersectionObserver((entries) => {
          // Find the entry that's most visible right now.
          let bestEntry = null;
          let bestRatio = 0;
          entries.forEach(entry => {
            if (entry.intersectionRatio > bestRatio) {
              bestRatio = entry.intersectionRatio;
              bestEntry = entry;
            }
          });
          if (!bestEntry || !bestEntry.isIntersecting) return;

          const newSection = bestEntry.target.id;
          if (newSection === currentSection) return;
          currentSection = newSection;

          // Recede previous approachers
          approaching.forEach(f => f.classList.remove('firefly--close'));
          // Bring new ones forward
          approaching = pickApproachSet();
          approaching.forEach(f => f.classList.add('firefly--close'));
        }, {
          // Fire whenever ≥40% of a section is in view.
          threshold: [0, 0.4, 0.8]
        });

        sections.forEach(s => observer.observe(s));
      }
    })();
  </script>

  <script>
    /* ═══════════════════════════════════════
       MAJESTIC AMBIENCE — shooting stars + cursor aura
       Two small effects that complete the "deep gold space" feeling.
       ═══════════════════════════════════════ */
    (function () {
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;

      const isMobile = window.matchMedia('(max-width: 768px), (pointer: coarse) and (hover: none)').matches;
      const isLowEnd = (navigator.hardwareConcurrency || 4) <= 4;
      const lite = isMobile || isLowEnd;

      /* --- 1. Shooting stars: spawn frequently with occasional bursts -----
         On mobile we space them out more (~7-15s) and disable burst pairs. */
      function spawnShootingStar() {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        const startY = (Math.random() * 75) + 5;
        const angle = (Math.random() * 30) + 15;
        const dur = (Math.random() * 0.8) + 1.0;
        star.style.setProperty('--start-y', startY + '%');
        star.style.setProperty('--start-x', '-15vw');
        star.style.setProperty('--angle', angle + 'deg');
        star.style.setProperty('--travel-dur', dur + 's');
        document.body.appendChild(star);
        setTimeout(() => star.remove(), dur * 1000 + 200);

        // Burst pair — desktop only; doubles the per-star compositing work
        if (!lite && Math.random() < 0.25) {
          setTimeout(() => {
            const followup = document.createElement('div');
            followup.className = 'shooting-star';
            const fy = startY + (Math.random() * 12) - 6;
            const fa = angle + (Math.random() * 10) - 5;
            const fd = (Math.random() * 0.6) + 0.9;
            followup.style.setProperty('--start-y', fy + '%');
            followup.style.setProperty('--start-x', '-15vw');
            followup.style.setProperty('--angle', fa + 'deg');
            followup.style.setProperty('--travel-dur', fd + 's');
            document.body.appendChild(followup);
            setTimeout(() => followup.remove(), fd * 1000 + 200);
          }, (Math.random() * 300) + 200);
        }

        // Mobile: 7–15s gap. Desktop: 3.5–8.5s gap.
        const nextDelay = lite
          ? (Math.random() * 8000) + 7000
          : (Math.random() * 5000) + 3500;
        setTimeout(spawnShootingStar, nextDelay);
      }
      setTimeout(spawnShootingStar, (Math.random() * 2000) + 2000);

      /* --- 2. Cursor aura: skip entirely on touch/mobile devices.
         Hover doesn't apply, and the rAF loop runs even when nothing moves. */
      if (lite) return;

      const aura = document.getElementById('cursor-aura');
      if (!aura) return;

      let targetX = window.innerWidth / 2;
      let targetY = window.innerHeight / 2;
      let currentX = targetX;
      let currentY = targetY;

      window.addEventListener('mousemove', (e) => {
        targetX = e.clientX;
        targetY = e.clientY;
        aura.classList.add('cursor-aura--active');
      }, { passive: true });

      // Lerp toward target every frame for buttery motion
      function tick() {
        currentX += (targetX - currentX) * 0.15;
        currentY += (targetY - currentY) * 0.15;
        aura.style.setProperty('--cx', currentX + 'px');
        aura.style.setProperty('--cy', currentY + 'px');
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      // Hide aura when cursor leaves window
      document.addEventListener('mouseleave', () => {
        aura.classList.remove('cursor-aura--active');
      });
    })();
  </script>

  <script>
    /* ═══════════════════════════════════════
       REVEAL FIREFLIES
       Click a firefly → pop animation → its associated text fades in.

       NOTE: Uses event delegation on document.body so it works for fireflies
       that get dynamically mounted from <template>s (see Firefly UI Unlock).
       ═══════════════════════════════════════ */
    (function () {
      /* --- 1. CLICK HANDLER (delegated) -------------------------------------- */
      document.body.addEventListener('click', (e) => {
        const firefly = e.target.closest('.reveal-firefly');
        if (!firefly) return;

        // Idempotent: ignore if already activated.
        if (firefly.classList.contains('reveal-firefly--activated')) return;

        // Pop animation
        firefly.classList.add('reveal-firefly--popping');
        setTimeout(() => {
          firefly.classList.remove('reveal-firefly--popping');
          firefly.classList.add('reveal-firefly--activated');
        }, 700);

        // Reveal the associated text after a small delay.
        const targetId = firefly.getAttribute('data-reveal');
        if (targetId) {
          const target = document.getElementById(targetId);
          if (target) {
            setTimeout(() => target.classList.add('revealed'), 250);
          }
        }
      });

      /* --- 2. SECTION-AWARE GLOW (re-runs as new blocks appear) -------------- */
      let observedBlocks = new WeakSet();
      let io = null;

      function ensureObserver() {
        if (io || !('IntersectionObserver' in window)) return;
        io = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            entry.target.classList.toggle('in-view', entry.isIntersecting);
          });
        }, { threshold: 0.3 });
      }

      function scanForBlocks() {
        ensureObserver();
        if (!io) return;
        document.querySelectorAll('.reveal-block').forEach(b => {
          if (!observedBlocks.has(b)) {
            observedBlocks.add(b);
            io.observe(b);
          }
        });
      }

      // Initial scan + re-scan whenever the DOM grows (dynamic section mounts).
      scanForBlocks();
      const mo = new MutationObserver(scanForBlocks);
      mo.observe(document.body, { childList: true, subtree: true });
    })();
  </script>

  <script>
    /* ═══════════════════════════════════════
       FIREFLY UI UNLOCK — scroll-driven sequential discovery
       ───────────────────────────────────────
       Architecture (4 separated concerns):
         (A) Slot setup — read existing .section-slot elements, attach refs.
         (B) Visibility observer — IntersectionObserver reveals each firefly
             as its slot scrolls into view, and tracks the "current" slot for
             progressive intensity.
         (C) Escalating pulse — per-firefly setInterval shrinks --blink-dur.
         (D) Click → mount — template is cloned, wrapped in a .text-reveal
             shell, inserted INTO the slot itself, then a .text-reveal--lit
             class is added on the next frame so the color transition fires.
       ═══════════════════════════════════════ */
    (function () {
      const stage = document.getElementById('stage');
      const countEl = document.getElementById('unlock-count');
      const resetBtn = document.getElementById('unlock-reset');
      if (!stage) return;

      /* (A) — slot + firefly refs ─────────────────────────────────────────── */
      const slots = Array.from(stage.querySelectorAll('.section-slot'));
      const fireflies = slots.map(s => s.querySelector('.unlock-firefly'));
      const unlocked = new Set();

      /* (B) — visibility / current-section tracking ──────────────────────── */
      let currentSlot = null;

      function setCurrent(slot) {
        if (slot === currentSlot) return;
        // Demote previous current → past
        if (currentSlot) {
          currentSlot.classList.remove('section-slot--current');
          if (unlocked.has(currentSlot.dataset.section)) {
            currentSlot.classList.add('section-slot--past');
          }
        }
        currentSlot = slot;
        // Promote new current — clear past in case we scrolled back
        slot.classList.remove('section-slot--past');
        slot.classList.add('section-slot--current', 'section-slot--revealed');
      }

      // Each slot is observed: once it crosses 30% in view it gets --revealed
      // (firefly fades in). Whichever slot is most-visible becomes --current.
      const visibilityIO = new IntersectionObserver((entries) => {
        // Reveal pass — any newly visible slot reveals its firefly.
        entries.forEach(e => {
          if (e.isIntersecting && e.intersectionRatio > 0.3) {
            e.target.classList.add('section-slot--revealed');
          }
        });

        // Current-slot pass — pick the slot with greatest visible area.
        let bestSlot = null;
        let bestArea = 0;
        slots.forEach(s => {
          const r = s.getBoundingClientRect();
          const visibleH = Math.max(0, Math.min(window.innerHeight, r.bottom) - Math.max(0, r.top));
          if (visibleH > bestArea) {
            bestArea = visibleH;
            bestSlot = s;
          }
        });
        if (bestSlot) setCurrent(bestSlot);
      }, { threshold: [0, 0.3, 0.6, 0.9] });

      slots.forEach(s => visibilityIO.observe(s));

      /* (C) — escalating pulse ───────────────────────────────────────────── */
      const BLINK_START = 4.0, BLINK_MIN = 0.6, BLINK_STEP = 0.4, ESCALATE_MS = 8000;
      const escalators = new Map();

      function startEscalation(f) {
        if (!f || escalators.has(f)) return;
        let dur = BLINK_START;
        f.style.setProperty('--blink-dur', dur + 's');
        const id = setInterval(() => {
          dur = Math.max(BLINK_MIN, dur - BLINK_STEP);
          f.style.setProperty('--blink-dur', dur + 's');
          if (dur === BLINK_MIN) {
            f.classList.add('unlock-firefly--urgent');
            clearInterval(id);
          }
        }, ESCALATE_MS);
        escalators.set(f, id);
      }

      function stopEscalation(f) {
        const id = escalators.get(f);
        if (id) clearInterval(id);
        escalators.delete(f);
      }

      // Start escalation for a firefly the FIRST time its slot is revealed.
      // (Otherwise unrevealed fireflies would secretly escalate while invisible.)
      const escalationStarted = new WeakSet();
      const revealStartIO = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting && e.intersectionRatio > 0.3) {
            const f = e.target.querySelector('.unlock-firefly');
            if (f && !escalationStarted.has(f) && !unlocked.has(e.target.dataset.section)) {
              escalationStarted.add(f);
              startEscalation(f);
            }
          }
        });
      }, { threshold: 0.3 });
      slots.forEach(s => revealStartIO.observe(s));

      /* (D) — click → mount template into slot ───────────────────────────── */
      function unlockSection(slot, firefly) {
        const targetId = slot.dataset.section;
        if (unlocked.has(targetId)) return;
        unlocked.add(targetId);

        // (D1) Pop firefly + stop its escalation
        stopEscalation(firefly);
        firefly.classList.remove('unlock-firefly--urgent');
        firefly.classList.add('unlock-firefly--popping');
        setTimeout(() => firefly.remove(), 800);

        // (D2) Clone template
        const tpl = document.getElementById('tpl-' + targetId);
        if (!tpl) {
          console.warn('Template not found:', targetId);
          return;
        }
        const fragment = tpl.content.cloneNode(true);

        // Strip animate-on-scroll (relies on script observers we missed)
        fragment.querySelectorAll('.animate-on-scroll').forEach(el => {
          el.classList.remove('animate-on-scroll');
        });

        // (D3) Wrap in text-reveal shell.
        const reveal = document.createElement('div');
        reveal.className = 'text-reveal unlocked-section unlocking';
        reveal.dataset.section = targetId;
        reveal.appendChild(fragment);

        // Slot becomes the mounted section: replace its content with the reveal wrapper.
        slot.classList.add('section-slot--mounted');
        slot.innerHTML = '';        // remove the (now-popped) firefly placeholder
        slot.appendChild(reveal);

        // (D4) Trigger the color transition. Reading offsetHeight forces the
        //      browser to flush styles synchronously — that's faster and more
        //      reliable in production than the 2-rAF dance, which can stall
        //      under heavy CPU load on slow devices. After the read, adding
        //      .text-reveal--lit reliably triggers the CSS color transition.
        // eslint-disable-next-line no-unused-expressions
        reveal.offsetHeight;        // force reflow
        reveal.classList.add('text-reveal--lit');

        // (D5) Drop entrance class after animation
        setTimeout(() => reveal.classList.remove('unlocking'), 1300);

        // (D6) Re-init lucide icons ONLY for icons inside this new fragment.
        //      Calling lucide.createIcons() with no args scans the entire
        //      document — gets slower each unlock. Targeting the wrapper is O(1).
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          try {
            // Newer lucide API accepts { nodes: [...] }
            window.lucide.createIcons({
              nodes: reveal.querySelectorAll('[data-lucide]')
            });
          } catch (e) {
            // Fallback for older versions: full scan
            window.lucide.createIcons();
          }
        }

        // (D7) Update HUD
        if (countEl) countEl.textContent = unlocked.size;
        if (unlocked.size === slots.length) {
          document.body.classList.add('all-unlocked');
        }
      }

      // Event delegation on the stage — handles clicks on any current/future firefly
      stage.addEventListener('click', (e) => {
        const f = e.target.closest('.unlock-firefly');
        if (!f) return;
        const slot = f.closest('.section-slot');
        if (!slot) return;
        unlockSection(slot, f);
      });

      /* Reset & welcome whisper ──────────────────────────────────────────── */
      if (resetBtn) {
        resetBtn.addEventListener('click', () => location.reload());
      }
      const welcome = document.getElementById('unlock-welcome');
      if (welcome) {
        const fade = () => welcome.classList.add('unlock-welcome--fading');
        setTimeout(fade, 6000);
        stage.addEventListener('click', fade, { once: true });
      }
    })();
  </script>
</body>

</html>
